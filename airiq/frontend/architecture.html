<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AirIQ — System Architecture</title>
  <meta name="description" content="System architecture diagram for AirIQ — multi-agent AI platform for urban air quality intelligence." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0d14;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 36px 20px;
      font-family: 'Inter', -apple-system, sans-serif;
      color: #e2e8f0;
    }

    .page-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 28px;
    }
    .page-header h1 {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #64748b;
    }
    .page-header .brand {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .diagram-card {
      background: #0f1117;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.07);
      padding: 24px;
      box-shadow: 0 24px 72px rgba(0,0,0,0.65);
      width: fit-content;
      max-width: 100%;
      overflow-x: auto;
    }

    svg { display: block; }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      justify-content: center;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.73rem;
      color: #64748b;
      letter-spacing: 0.02em;
    }
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div class="page-header">
    <div class="brand">AirIQ</div>
    <h1>System Architecture</h1>
  </div>

  <div class="diagram-card">
    <svg viewBox="0 0 900 600" width="900" height="600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AirIQ system architecture diagram">
      <title>AirIQ System Architecture</title>

      <!-- Background -->
      <rect width="900" height="600" fill="#0f1117" rx="0"/>

      <!-- ── Arrowhead Defs ──────────────────────────────────────────────── -->
      <defs>
        <!-- Solid arrow (main flow) -->
        <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="5" markerHeight="5" orient="auto">
          <path d="M0,1.5 L8.5,5 L0,8.5Z" fill="#94a3b8"/>
        </marker>
        <!-- Muted arrow (dashed / secondary) -->
        <marker id="arr-d" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="5" markerHeight="5" orient="auto">
          <path d="M0,1.5 L8.5,5 L0,8.5Z" fill="#475569"/>
        </marker>
      </defs>

      <!-- ══════════════════════════════════════════════════════════════════
           SECTION LABELS + DIVIDERS
      ══════════════════════════════════════════════════════════════════ -->

      <text x="14" y="18" fill="#475569" font-size="8.5" font-family="'Courier New',monospace" letter-spacing="1.8" font-weight="500">DATA SOURCES</text>
      <line x1="14" y1="22" x2="886" y2="22" stroke="#1e293b" stroke-width="1"/>

      <text x="14" y="106" fill="#475569" font-size="8.5" font-family="'Courier New',monospace" letter-spacing="1.8" font-weight="500">INGESTION</text>
      <line x1="14" y1="110" x2="886" y2="110" stroke="#1e293b" stroke-width="1"/>

      <text x="14" y="196" fill="#475569" font-size="8.5" font-family="'Courier New',monospace" letter-spacing="1.8" font-weight="500">AI AGENTS</text>
      <line x1="14" y1="200" x2="886" y2="200" stroke="#1e293b" stroke-width="1"/>

      <text x="14" y="328" fill="#475569" font-size="8.5" font-family="'Courier New',monospace" letter-spacing="1.8" font-weight="500">BACKEND</text>
      <line x1="14" y1="332" x2="886" y2="332" stroke="#1e293b" stroke-width="1"/>

      <text x="14" y="424" fill="#475569" font-size="8.5" font-family="'Courier New',monospace" letter-spacing="1.8" font-weight="500">FRONTEND</text>
      <line x1="14" y1="428" x2="886" y2="428" stroke="#1e293b" stroke-width="1"/>

      <!-- ══════════════════════════════════════════════════════════════════
           ROW 1 — DATA SOURCES  (blue · y=28 · h=54)
      ══════════════════════════════════════════════════════════════════ -->

      <!-- CPCB AQI API -->
      <rect x="55" y="28" width="165" height="54" rx="7" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="137" y="55" fill="#ffffff" font-size="12" font-weight="600" font-family="Inter,sans-serif" text-anchor="middle" dominant-baseline="middle">CPCB AQI API</text>

      <!-- Historical CSV (one-time) -->
      <rect x="368" y="28" width="164" height="54" rx="7" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="450" y="47" fill="#ffffff" font-size="11.5" font-weight="600" font-family="Inter,sans-serif" text-anchor="middle">Historical CSV</text>
      <text x="450" y="66" fill="#93c5fd" font-size="8.5" font-family="Inter,sans-serif" text-anchor="middle">one-time training data</text>

      <!-- Open-Meteo Weather -->
      <rect x="681" y="28" width="164" height="54" rx="7" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="763" y="47" fill="#ffffff" font-size="11.5" font-weight="600" font-family="Inter,sans-serif" text-anchor="middle">Open-Meteo</text>
      <text x="763" y="66" fill="#93c5fd" font-size="8.5" font-family="Inter,sans-serif" text-anchor="middle">Weather API (free)</text>

      <!-- ══════════════════════════════════════════════════════════════════
           ROW 2 — INGESTION  (teal · y=116 · h=54)
      ══════════════════════════════════════════════════════════════════ -->

      <!-- AQI Fetcher -->
      <rect x="55" y="116" width="120" height="54" rx="7" fill="#0c3535" stroke="#14b8a6" stroke-width="1.5"/>
      <text x="115" y="143" fill="#ffffff" font-size="11" font-weight="600" font-family="Inter,sans-serif" text-anchor="middle" dominant-baseline="middle">AQI Fetcher</text>

      <!-- Quality Checker -->
      <rect x="200" y="116" width="130" height="54" rx="7" fill="#0c3535" stroke="#14b8a6" stroke-width="1.5"/>
      <text x="265" y="133" fill="#ffffff" font-size="11" font-weight="600" font-family="Inter,sans-serif" text-anchor="middle">Quality</text>
      <text x="265" y="151" fill="#ffffff" font-size="11" font-weight="600" font-family="Inter,sans-serif" text-anchor="middle">Checker</text>

      <!-- Redis Cache -->
      <rect x="362" y="116" width="132" height="54" rx="7" fill="#0c3535" stroke="#14b8a6" stroke-width="1.5"/>
      <text x="428" y="133" fill="#ffffff" font-size="12" font-weight="700" font-family="Inter,sans-serif" text-anchor="middle">Redis Cache</text>
      <text x="428" y="152" fill="#5eead4" font-size="8.5" font-family="Inter,sans-serif" text-anchor="middle">AQI + Weather store</text>

      <!-- Weather Fetcher -->
      <rect x="672" y="116" width="163" height="54" rx="7" fill="#0c3535" stroke="#14b8a6" stroke-width="1.5"/>
      <text x="753" y="143" fill="#ffffff" font-size="11" font-weight="600" font-family="Inter,sans-serif" text-anchor="middle" dominant-baseline="middle">Weather Fetcher</text>

      <!-- ══════════════════════════════════════════════════════════════════
           ROW 3 — AI AGENTS  (purple · y=206 · h=78)
      ══════════════════════════════════════════════════════════════════ -->

      <!-- Attribution Agent -->
      <rect x="63" y="206" width="145" height="78" rx="7" fill="#1e0a4c" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="135" y="234" fill="#ffffff" font-size="11" font-weight="600" font-family="Inter,sans-serif" text-anchor="middle">Attribution</text>
      <text x="135" y="251" fill="#ffffff" font-size="11" font-weight="600" font-family="Inter,sans-serif" text-anchor="middle">Agent</text>

      <!-- Forecast Agent (XGBoost) -->
      <rect x="220" y="206" width="145" height="78" rx="7" fill="#1e0a4c" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="292" y="229" fill="#ffffff" font-size="11" font-weight="600" font-family="Inter,sans-serif" text-anchor="middle">Forecast Agent</text>
      <!-- XGBoost badge -->
      <rect x="228" y="240" width="129" height="16" rx="3" fill="#12064a" stroke="#5b21b6" stroke-width="1"/>
      <text x="292" y="248" fill="#a78bfa" font-size="8" font-family="'Courier New',monospace" text-anchor="middle" dominant-baseline="middle">XGBoost · n=200 · d=6</text>

      <!-- Enforcement Agent -->
      <rect x="377" y="206" width="145" height="78" rx="7" fill="#1e0a4c" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="449" y="234" fill="#ffffff" font-size="11" font-weight="600" font-family="Inter,sans-serif" text-anchor="middle">Enforcement</text>
      <text x="449" y="251" fill="#ffffff" font-size="11" font-weight="600" font-family="Inter,sans-serif" text-anchor="middle">Agent</text>

      <!-- Advisory Agent (Claude) -->
      <rect x="534" y="206" width="145" height="78" rx="7" fill="#1e0a4c" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="606" y="225" fill="#ffffff" font-size="11" font-weight="600" font-family="Inter,sans-serif" text-anchor="middle">Advisory</text>
      <text x="606" y="241" fill="#ffffff" font-size="11" font-weight="600" font-family="Inter,sans-serif" text-anchor="middle">Agent</text>
      <!-- Claude badge -->
      <rect x="538" y="253" width="137" height="16" rx="3" fill="#2d1a6e" stroke="#6d28d9" stroke-width="1"/>
      <text x="606" y="261" fill="#c4b5fd" font-size="7.5" font-family="'Courier New',monospace" text-anchor="middle" dominant-baseline="middle">claude-sonnet-4-6</text>

      <!-- Incident Commander (Claude) -->
      <rect x="691" y="206" width="145" height="78" rx="7" fill="#1e0a4c" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="763" y="225" fill="#ffffff" font-size="11" font-weight="600" font-family="Inter,sans-serif" text-anchor="middle">Incident</text>
      <text x="763" y="241" fill="#ffffff" font-size="11" font-weight="600" font-family="Inter,sans-serif" text-anchor="middle">Commander</text>
      <!-- Claude badge -->
      <rect x="695" y="253" width="137" height="16" rx="3" fill="#2d1a6e" stroke="#6d28d9" stroke-width="1"/>
      <text x="763" y="261" fill="#c4b5fd" font-size="7.5" font-family="'Courier New',monospace" text-anchor="middle" dominant-baseline="middle">claude-sonnet-4-6</text>

      <!-- ══════════════════════════════════════════════════════════════════
           ROW 4 — BACKEND  (gray · y=338 · h=54)
      ══════════════════════════════════════════════════════════════════ -->

      <!-- APScheduler -->
      <rect x="115" y="338" width="205" height="54" rx="7" fill="#1f2937" stroke="#6b7280" stroke-width="1.5"/>
      <text x="217" y="358" fill="#ffffff" font-size="12" font-weight="600" font-family="Inter,sans-serif" text-anchor="middle">APScheduler</text>
      <text x="217" y="377" fill="#9ca3af" font-size="9" font-family="Inter,sans-serif" text-anchor="middle">30-min pipeline cycle</text>

      <!-- FastAPI REST API -->
      <rect x="580" y="338" width="205" height="54" rx="7" fill="#1f2937" stroke="#6b7280" stroke-width="1.5"/>
      <text x="682" y="358" fill="#ffffff" font-size="12" font-weight="600" font-family="Inter,sans-serif" text-anchor="middle">FastAPI REST API</text>
      <text x="682" y="377" fill="#9ca3af" font-size="9" font-family="Inter,sans-serif" text-anchor="middle">pre-cached · &lt;10ms</text>

      <!-- ══════════════════════════════════════════════════════════════════
           ROW 5 — FRONTEND  (amber · y=434 · h=54)
      ══════════════════════════════════════════════════════════════════ -->

      <!-- Leaflet Map -->
      <rect x="93" y="434" width="165" height="54" rx="7" fill="#451a03" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="175" y="461" fill="#ffffff" font-size="11" font-weight="600" font-family="Inter,sans-serif" text-anchor="middle" dominant-baseline="middle">Leaflet Map</text>

      <!-- Ward Detail Panel -->
      <rect x="276" y="434" width="165" height="54" rx="7" fill="#451a03" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="358" y="453" fill="#ffffff" font-size="11" font-weight="600" font-family="Inter,sans-serif" text-anchor="middle">Ward Detail</text>
      <text x="358" y="470" fill="#ffffff" font-size="11" font-weight="600" font-family="Inter,sans-serif" text-anchor="middle">Panel</text>

      <!-- City Switcher (4 cities) -->
      <rect x="459" y="434" width="165" height="54" rx="7" fill="#451a03" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="541" y="453" fill="#ffffff" font-size="11" font-weight="600" font-family="Inter,sans-serif" text-anchor="middle">City Switcher</text>
      <text x="541" y="469" fill="#fcd34d" font-size="8" font-family="Inter,sans-serif" text-anchor="middle">BLR · DEL · MUM · KOL</text>

      <!-- Incident Report -->
      <rect x="642" y="434" width="165" height="54" rx="7" fill="#451a03" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="724" y="453" fill="#ffffff" font-size="11" font-weight="600" font-family="Inter,sans-serif" text-anchor="middle">Incident</text>
      <text x="724" y="470" fill="#ffffff" font-size="11" font-weight="600" font-family="Inter,sans-serif" text-anchor="middle">Report</text>

      <!-- ══════════════════════════════════════════════════════════════════
           ARROWS — solid (#94a3b8)
      ══════════════════════════════════════════════════════════════════ -->

      <!-- Row1 → Row2 ↓ CPCB → AQI Fetcher -->
      <line x1="137" y1="83" x2="115" y2="114" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

      <!-- Row1 → Row2 ↓ Open-Meteo → Weather Fetcher -->
      <line x1="763" y1="83" x2="753" y2="114" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

      <!-- Row2 → horizontal: AQI Fetcher → Quality Checker -->
      <line x1="176" y1="143" x2="198" y2="143" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

      <!-- Row2 → horizontal: Quality Checker → Redis Cache -->
      <line x1="331" y1="143" x2="360" y2="143" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

      <!-- Row2 → horizontal: Weather Fetcher → Redis Cache (reversed) -->
      <line x1="670" y1="143" x2="496" y2="143" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

      <!-- Row2 → Row3 ↓ Redis Cache → Enforcement Agent (center; represents full pipeline) -->
      <line x1="428" y1="171" x2="449" y2="204" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
      <!-- pipeline label -->
      <text x="470" y="191" fill="#475569" font-size="8" font-family="Inter,sans-serif">runs pipeline</text>

      <!-- Row3 → Row4 ↓ Enforcement Agent → APScheduler (diagonal; agents feed orchestrator) -->
      <line x1="449" y1="285" x2="220" y2="336" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
      <!-- results label -->
      <text x="295" y="316" fill="#475569" font-size="8" font-family="Inter,sans-serif">results → cache</text>

      <!-- Row4 → horizontal: APScheduler → FastAPI -->
      <line x1="321" y1="365" x2="578" y2="365" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
      <text x="450" y="359" fill="#475569" font-size="8" font-family="Inter,sans-serif" text-anchor="middle">pre-caches ward blobs</text>

      <!-- Row4 → Row5 ↓ FastAPI → Frontend (Ward Detail Panel / City Switcher center) -->
      <line x1="682" y1="393" x2="541" y2="432" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
      <text x="630" y="416" fill="#475569" font-size="8" font-family="Inter,sans-serif" text-anchor="middle">REST</text>

      <!-- ══════════════════════════════════════════════════════════════════
           DASHED ARROW — Historical CSV → Forecast Agent (one-time training)
      ══════════════════════════════════════════════════════════════════ -->
      <line x1="450" y1="83" x2="292" y2="204"
            stroke="#475569" stroke-width="1.5" stroke-dasharray="5,4"
            marker-end="url(#arr-d)"/>
      <!-- label near midpoint -->
      <text x="408" y="145" fill="#374151" font-size="7.5" font-family="'Courier New',monospace"
            text-anchor="middle" transform="rotate(-34,408,145)">offline training</text>

      <!-- ══════════════════════════════════════════════════════════════════
           CAPTION
      ══════════════════════════════════════════════════════════════════ -->
      <text x="450" y="520" fill="#1e293b" font-size="9.5" font-family="'Courier New',monospace"
            text-anchor="middle" letter-spacing="0.5">
        AirIQ · 5-Agent Pipeline · 4 Indian Cities · Redis-backed · 30-min intelligence cycle
      </text>
    </svg>

    <!-- Legend -->
    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:#1e3a8a; border: 1.5px solid #3b82f6;"></div>
        Data Sources
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#0c3535; border: 1.5px solid #14b8a6;"></div>
        Ingestion
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#1e0a4c; border: 1.5px solid #8b5cf6;"></div>
        AI Agents
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#1f2937; border: 1.5px solid #6b7280;"></div>
        Backend
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#451a03; border: 1.5px solid #f59e0b;"></div>
        Frontend
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#2d1a6e; border: 1.5px solid #6d28d9;"></div>
        Claude API
      </div>
    </div>
  </div>

</body>
</html>
