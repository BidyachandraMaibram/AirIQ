<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AirIQ — System Status</title>
  <meta name="description" content="AirIQ real-time system health dashboard showing data pipeline status for all monitored cities." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:           #0f1117;
      --surface:      #1a1d2e;
      --surface-2:    #22263a;
      --border:       rgba(255,255,255,0.08);
      --text:         #e2e8f0;
      --text-muted:   #64748b;
      --accent:       #6366f1;
      --good:         #22c55e;
      --warn:         #eab308;
      --bad:          #ef4444;
      --moderate:     #f97316;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 24px;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo-area h1 {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-area p {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .refresh-info {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .pulse-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--good);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.8); }
    }

    /* ── Grid ───────────────────────────────────────────────────────────── */
    .city-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    /* ── City Card ──────────────────────────────────────────────────────── */
    .city-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px;
      transition: border-color 0.2s;
    }
    .city-card:hover { border-color: rgba(99,102,241,0.3); }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .city-name {
      font-size: 1rem;
      font-weight: 600;
    }
    .city-subtitle {
      font-size: 0.74rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .status-badge.good   { background: rgba(34,197,94,0.12);  color: var(--good); }
    .status-badge.warn   { background: rgba(234,179,8,0.12);  color: var(--warn); }
    .status-badge.bad    { background: rgba(239,68,68,0.12);  color: var(--bad);  }
    .status-badge .dot {
      width: 7px; height: 7px; border-radius: 50%;
    }
    .status-badge.good .dot { background: var(--good); }
    .status-badge.warn .dot { background: var(--warn); animation: pulse 1.5s infinite; }
    .status-badge.bad  .dot { background: var(--bad);  animation: pulse 0.8s infinite; }

    /* ── Metrics ────────────────────────────────────────────────────────── */
    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .metric {
      background: var(--surface-2);
      border-radius: 8px;
      padding: 11px 14px;
    }
    .metric-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .metric-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
    }

    /* ── Stations ───────────────────────────────────────────────────────── */
    .stations-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }
    .station-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      margin-bottom: 4px;
      background: var(--surface-2);
    }
    .station-name { color: var(--text-muted); }
    .station-aqi  { font-family: 'JetBrains Mono', monospace; font-weight: 500; }

    /* AQI colour coding */
    .aqi-good      { color: #22c55e; }
    .aqi-sat       { color: #84cc16; }
    .aqi-moderate  { color: #eab308; }
    .aqi-poor      { color: #f97316; }
    .aqi-verypoor  { color: #ef4444; }
    .aqi-severe    { color: #7c3aed; }

    /* ── Flags ──────────────────────────────────────────────────────────── */
    .flags-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }
    .flag-chip {
      padding: 3px 9px;
      border-radius: 10px;
      font-size: 0.72rem;
      background: rgba(234,179,8,0.12);
      color: var(--warn);
      border: 1px solid rgba(234,179,8,0.2);
    }
    .no-flags {
      font-size: 0.76rem;
      color: var(--good);
    }

    /* ── Last updated ───────────────────────────────────────────────────── */
    .last-updated {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 14px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Summary bar ────────────────────────────────────────────────────── */
    .summary-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 22px;
      font-size: 0.83rem;
      color: var(--text-muted);
      margin-bottom: 20px;
    }
    .summary-bar strong { color: var(--text); }

    /* ── Loading skeleton ───────────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface-2) 25%, rgba(255,255,255,0.04) 50%, var(--surface-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
      height: 16px;
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }

    /* ── Error state ────────────────────────────────────────────────────── */
    .error-msg {
      color: var(--bad);
      font-size: 0.82rem;
      margin-top: 8px;
    }

    /* ── Footer ─────────────────────────────────────────────────────────── */
    footer {
      text-align: center;
      font-size: 0.76rem;
      color: var(--text-muted);
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    #countdown { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo-area">
      <h1>AirIQ — System Status</h1>
      <p>Real-time pipeline health for all monitored cities</p>
    </div>
    <div class="refresh-info">
      <div class="pulse-dot"></div>
      Auto-refresh in <span id="countdown">30</span>s
    </div>
  </header>

  <!-- Summary bar -->
  <div class="summary-bar" id="summary-bar">
    Fetching status…
  </div>

  <!-- City grid -->
  <div class="city-grid" id="city-grid">
    <!-- Populated by JS -->
  </div>

  <!-- Footer -->
  <footer>
    AirIQ Status Page &nbsp;|&nbsp;
    <a href="/" id="dashboard-link">Back to Dashboard</a>
    &nbsp;|&nbsp;
    Data: CPCB + Open-Meteo
  </footer>

  <script>
    const API = "http://localhost:8000";
    let countdown = 30;

    // ── AQI helpers ──────────────────────────────────────────────────────────
    function aqiClass(aqi) {
      if (aqi <= 50)  return "aqi-good";
      if (aqi <= 100) return "aqi-sat";
      if (aqi <= 200) return "aqi-moderate";
      if (aqi <= 300) return "aqi-poor";
      if (aqi <= 400) return "aqi-verypoor";
      return "aqi-severe";
    }

    function aqiLabel(aqi) {
      if (aqi <= 50)  return "Good";
      if (aqi <= 100) return "Satisfactory";
      if (aqi <= 200) return "Moderate";
      if (aqi <= 300) return "Poor";
      if (aqi <= 400) return "Very Poor";
      return "Severe";
    }

    function formatTime(isoString) {
      if (!isoString) return "—";
      try {
        const d = new Date(isoString);
        return d.toLocaleTimeString("en-IN", { hour12: false });
      } catch { return isoString; }
    }

    function timeAgo(isoString) {
      if (!isoString) return "unknown";
      try {
        const diff = Math.floor((Date.now() - new Date(isoString)) / 1000);
        if (diff < 60)   return `${diff}s ago`;
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        return `${Math.floor(diff / 3600)}h ago`;
      } catch { return "—"; }
    }

    function statusFromAge(isoString) {
      if (!isoString) return "bad";
      const diff = Math.floor((Date.now() - new Date(isoString)) / 1000);
      if (diff < 2100) return "good";   // < 35 min
      if (diff < 5400) return "warn";   // < 90 min
      return "bad";
    }

    // ── Build city card HTML ─────────────────────────────────────────────────
    function buildCard(cityId, healthData, summaryData) {
      const cityNames = {
        bengaluru: "Bengaluru", delhi: "Delhi",
        mumbai:    "Mumbai",    kolkata: "Kolkata"
      };
      const citySubtitles = {
        bengaluru: "Karnataka", delhi: "NCT",
        mumbai:    "Maharashtra", kolkata: "West Bengal"
      };

      const status    = statusFromAge(healthData?.last_fetch);
      const statusTxt = status === "good" ? "Operational" : status === "warn" ? "Stale" : "Offline";
      const stationCount = healthData?.station_count ?? "?";
      const lastFetch = healthData?.last_fetch;
      const stations = healthData?.stations ?? {};

      // Collect all flags across stations
      const allFlags = [];
      Object.values(stations).forEach(s => {
        if (s.flags) allFlags.push(...s.flags);
      });
      const uniqueFlags = [...new Set(allFlags)];

      // Ward AQI rows from summary
      const wards = summaryData?.wards ?? [];
      const avgAqi = wards.length
        ? Math.round(wards.reduce((a, w) => a + w.aqi, 0) / wards.length)
        : null;

      // Station rows from health data
      const stationRows = Object.entries(stations).slice(0, 4).map(([sid, s]) => `
        <div class="station-row">
          <span class="station-name">${s.name ?? sid}</span>
          <span class="station-aqi ${aqiClass(s.aqi ?? 0)}">${s.aqi ?? "—"}</span>
        </div>
      `).join("");

      const flagsHtml = uniqueFlags.length
        ? uniqueFlags.map(f => `<span class="flag-chip">${f}</span>`).join("")
        : `<span class="no-flags">No quality flags</span>`;

      return `
        <div class="city-card" id="card-${cityId}">
          <div class="card-header">
            <div>
              <div class="city-name">${cityNames[cityId] ?? cityId}</div>
              <div class="city-subtitle">${citySubtitles[cityId] ?? ""}</div>
            </div>
            <div class="status-badge ${status}">
              <div class="dot"></div>${statusTxt}
            </div>
          </div>

          <div class="metrics">
            <div class="metric">
              <div class="metric-label">Stations</div>
              <div class="metric-value">${stationCount}</div>
            </div>
            <div class="metric">
              <div class="metric-label">Avg AQI</div>
              <div class="metric-value ${avgAqi ? aqiClass(avgAqi) : ''}">${avgAqi ?? "—"}</div>
            </div>
            <div class="metric">
              <div class="metric-label">Category</div>
              <div class="metric-value" style="font-size:0.8rem;">${avgAqi ? aqiLabel(avgAqi) : "—"}</div>
            </div>
            <div class="metric">
              <div class="metric-label">Last Fetch</div>
              <div class="metric-value" style="font-size:0.78rem;">${timeAgo(lastFetch)}</div>
            </div>
          </div>

          <div class="stations-label">Station Readings</div>
          ${stationRows || '<div class="station-row"><span class="station-name" style="color:#64748b;">No data</span></div>'}

          <div class="flags-row">${flagsHtml}</div>
          <div class="last-updated">Last updated: ${formatTime(lastFetch)}</div>
        </div>
      `;
    }

    // ── Fetch and render ─────────────────────────────────────────────────────
    async function fetchAll() {
      const grid    = document.getElementById("city-grid");
      const summary = document.getElementById("summary-bar");

      try {
        // Fetch the cities list
        const citiesRes = await fetch(`${API}/api/cities`);
        if (!citiesRes.ok) throw new Error(`HTTP ${citiesRes.status}`);
        const raw  = await citiesRes.json();
        const cities = Array.isArray(raw) ? raw : (raw.cities ?? []);

        // Fetch health data for each city
        const healthFetches = cities.map(c =>
          fetch(`${API}/health`).then(r => r.json()).catch(() => null)
        );

        // Also fetch /health once for the global health blob
        let healthBlob = null;
        try {
          const hRes = await fetch(`${API}/health`);
          healthBlob = await hRes.json();
        } catch (_) {}

        const cityHealthMap = {};
        const citySummaryMap = {};

        for (const city of cities) {
          const cid = city.city_id;
          // Try /api/debug/cities for health data, fallback to /health top-level
          try {
            const dRes = await fetch(`${API}/api/debug/cities`);
            if (dRes.ok) {
              const dbg = await dRes.json();
              // No per-city health in debug endpoint, use /health
            }
          } catch (_) {}

          // Fetch city summary
          try {
            const sRes = await fetch(`${API}/api/city/${cid}/summary`);
            if (sRes.ok) {
              citySummaryMap[cid] = await sRes.json();
            }
          } catch (_) {}

          // Build health from /health blob if available
          const cityHealth = healthBlob?.cities?.[cid] ?? healthBlob?.[cid];
          cityHealthMap[cid] = cityHealth ?? null;
        }

        // Count operational cities
        const totalCities = cities.length;
        const opCities = Object.values(cityHealthMap).filter(h => h && statusFromAge(h?.last_fetch) === "good").length;
        const totalStations = Object.values(cityHealthMap).reduce((acc, h) => acc + (h?.station_count ?? 0), 0);
        const lastUpdate = new Date().toLocaleTimeString("en-IN", { hour12: false });

        summary.innerHTML = `
          <span>
            <strong>${opCities}/${totalCities}</strong> cities operational &nbsp;|&nbsp;
            <strong>${totalStations || cities.length * 4}</strong> stations monitored &nbsp;|&nbsp;
            Last refresh: <strong>${lastUpdate}</strong>
          </span>
          <span style="color:var(--text-muted); font-size:0.76rem;">
            Backend: <span style="color:${healthBlob ? 'var(--good)' : 'var(--bad)'}">
              ${healthBlob ? 'Connected' : 'Unreachable'}
            </span>
          </span>
        `;

        // Render city cards
        grid.innerHTML = cities.map(c =>
          buildCard(c.city_id, cityHealthMap[c.city_id], citySummaryMap[c.city_id])
        ).join("");

      } catch (err) {
        console.error("Status fetch failed:", err);
        summary.innerHTML = `<span style="color:var(--bad)">Backend unreachable — is uvicorn running on port 8000? (${err.message})</span>`;
        grid.innerHTML = "";
      }
    }

    // ── Health endpoint also returns city data ───────────────────────────────
    // Override the card rendering to use /health data when /api/debug/cities isn't available
    async function fetchCityHealth(cityId) {
      try {
        const r = await fetch(`${API}/health`);
        if (!r.ok) return null;
        const data = await r.json();
        // The health endpoint returns nested city data
        return data?.cities?.[cityId] ?? data?.[cityId] ?? null;
      } catch { return null; }
    }

    // ── Auto-refresh countdown ───────────────────────────────────────────────
    function startCountdown() {
      const el = document.getElementById("countdown");
      countdown = 30;
      const interval = setInterval(() => {
        countdown--;
        if (el) el.textContent = countdown;
        if (countdown <= 0) {
          clearInterval(interval);
          fetchAll().then(() => startCountdown());
        }
      }, 1000);
    }

    // ── Dashboard link detection ─────────────────────────────────────────────
    const port = window.location.port;
    document.getElementById("dashboard-link").href =
      `http://localhost:${port || 3000}/`;

    // ── Init ─────────────────────────────────────────────────────────────────
    fetchAll().then(() => startCountdown());
  </script>
</body>
</html>
